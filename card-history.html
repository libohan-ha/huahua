<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片历史 - VISIONARY</title>
    <link href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-100-M/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-neon-pink: #ff1493;
            --color-electric-blue: #00ffff;
            --color-purple: #9d4edd;
            --color-dark-blue: #0a1128;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }
        
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, 5%) scale(1.1); }
            50% { transform: translate(0, 10%) scale(0.9); }
            75% { transform: translate(-5%, 5%) scale(1.05); }
        }
        
        .gradient-text {
            background: linear-gradient(45deg, var(--color-neon-pink), var(--color-electric-blue), var(--color-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
        }
        
        .neon-border {
            box-shadow: 0 0 10px var(--color-neon-pink),
                      0 0 20px var(--color-electric-blue);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        
        .card-container {
            max-height: 300px;
            overflow-y: auto;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.5rem 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 50;
        }
        
        main {
            flex: 1;
            padding-bottom: 80px; /* 为底部导航留出空间 */
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 to-black">
    <!-- 动态背景 -->
    <div class="animated-bg">
        <div class="bg-blob" style="top: 15%; left: 10%; width: 500px; height: 500px; background: rgba(255, 20, 147, 0.2); animation-delay: 0s;"></div>
        <div class="bg-blob" style="top: 50%; left: 60%; width: 600px; height: 600px; background: rgba(0, 255, 255, 0.2); animation-delay: 2s;"></div>
        <div class="bg-blob" style="top: 70%; left: 20%; width: 400px; height: 400px; background: rgba(157, 78, 221, 0.2); animation-delay: 4s;"></div>
    </div>
    
    <!-- 顶部导航栏 -->
    <nav class="fixed w-full z-50 bg-black bg-opacity-80 backdrop-filter backdrop-blur-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <h1 class="text-3xl font-bold gradient-text">VISIONARY</h1>
            </div>
            <div class="hidden md:flex space-x-8 items-center">
                <a href="/" class="text-white hover:text-pink-500 transition-colors">首页</a>
                <a href="/create" class="text-white hover:text-pink-500 transition-colors">生成图片</a>
                <a href="/create-card" class="text-white hover:text-pink-500 transition-colors">生成卡片</a>
                <a href="/history" class="text-white hover:text-pink-500 transition-colors">图片历史</a>
                <a href="/card-history" class="text-pink-500">卡片历史</a>
                <a href="/logout" class="bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-2 rounded-full text-white font-bold">退出</a>
            </div>
            <div class="md:hidden">
                <button class="text-white text-2xl"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="pt-24 pb-12">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl font-bold mb-12 text-center gradient-text">卡片历史</h1>
            
            <!-- 卡片列表 -->
            {% if cards and cards|length > 0 %}
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
                {% for card in cards %}
                <div class="bg-gray-800 bg-opacity-50 rounded-xl overflow-hidden neon-border">
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <p class="text-sm text-gray-400">{{ card.created_at }}</p>
                                <h3 class="text-lg font-semibold">{{ card.style }}</h3>
                            </div>
                            <button onclick="downloadCard('card-{{ card.id }}')" class="text-blue-400 hover:text-blue-300 flex items-center">
                                <i class="fas fa-download mr-1"></i> 下载
                            </button>
                        </div>
                        <div class="card-container bg-gray-900 rounded-lg p-4 overflow-hidden" id="card-{{ card.id }}">
                            <!-- 渲染HTML内容 -->
                            {{ card.html_code|safe }}
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <div class="text-center py-16">
                <i class="fas fa-id-card text-6xl text-gray-700 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-400">暂无卡片历史</h2>
                <p class="text-gray-500 mt-2">去生成一些精美的卡片吧</p>
                <a href="/create-card" class="inline-block mt-6 bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-3 rounded-full text-white font-bold">开始创作</a>
            </div>
            {% endif %}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-black bg-opacity-80 py-6 text-center text-gray-500">
        <div class="container mx-auto px-4">
            <p>© 2025 VISIONARY AI创作平台. 保留所有权利.</p>
        </div>
    </footer>
    
    <!-- 底部导航栏 -->
    <div class="bottom-nav md:hidden">
        <div class="container mx-auto">
            <div class="flex justify-between items-center px-6">
                <a href="/" class="flex flex-col items-center">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-xs mt-1">首页</span>
                </a>
                <a href="/create" class="flex flex-col items-center">
                    <i class="fas fa-image text-xl"></i>
                    <span class="text-xs mt-1">生成图片</span>
                </a>
                <a href="/create-card" class="flex flex-col items-center">
                    <i class="fas fa-id-card text-xl"></i>
                    <span class="text-xs mt-1">生成卡片</span>
                </a>
                <a href="/history" class="flex flex-col items-center">
                    <i class="fas fa-history text-xl"></i>
                    <span class="text-xs mt-1">图片历史</span>
                </a>
                <a href="/card-history" class="flex flex-col items-center text-pink-500">
                    <i class="fas fa-folder text-xl"></i>
                    <span class="text-xs mt-1">卡片历史</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 下载卡片功能
        function downloadCard(cardId) {
            const cardElement = document.getElementById(cardId);
            
            html2canvas(cardElement, {
                scale: 2,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `visionary-card-${cardId}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
    <!-- 添加html2canvas库，用于将HTML转换为图像 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
