<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成历史 - VISIONARY</title>
    <link href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-100-M/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-neon-pink: #ff1493;
            --color-electric-blue: #00ffff;
            --color-purple: #9d4edd;
            --color-dark-blue: #0a1128;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }
        
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, 5%) scale(1.1); }
            50% { transform: translate(0, 10%) scale(0.9); }
            75% { transform: translate(-5%, 5%) scale(1.05); }
        }
        
        .gradient-text {
            background: linear-gradient(45deg, var(--color-neon-pink), var(--color-electric-blue), var(--color-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
        }
        
        .neon-border {
            box-shadow: 0 0 10px var(--color-neon-pink),
                      0 0 20px var(--color-electric-blue);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        
        .image-container {
            overflow: hidden;
            position: relative;
        }
        
        .image-container img {
            transition: transform 0.5s ease;
        }
        
        .image-container:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 to-black">
    <!-- 动态背景 -->
    <div class="animated-bg">
        <div class="bg-blob" style="top: 15%; left: 10%; width: 500px; height: 500px; background: rgba(255, 20, 147, 0.2); animation-delay: 0s;"></div>
        <div class="bg-blob" style="top: 50%; left: 60%; width: 600px; height: 600px; background: rgba(0, 255, 255, 0.2); animation-delay: 2s;"></div>
        <div class="bg-blob" style="top: 70%; left: 20%; width: 400px; height: 400px; background: rgba(157, 78, 221, 0.2); animation-delay: 4s;"></div>
    </div>
    
    <!-- 导航栏 -->
    <nav class="fixed w-full z-50 bg-black bg-opacity-80 backdrop-filter backdrop-blur-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <h1 class="text-3xl font-bold gradient-text">VISIONARY</h1>
            </div>
            <div class="hidden md:flex space-x-8 items-center">
                <a href="/" class="text-white hover:text-pink-500 transition-colors">首页</a>
                <a href="/create" class="text-white hover:text-pink-500 transition-colors">生成图片</a>
                <a href="/create-card" class="text-white hover:text-pink-500 transition-colors">生成卡片</a>
                <a href="/history" class="text-pink-500">图片历史</a>
                <a href="/card-history" class="text-white hover:text-pink-500 transition-colors">卡片历史</a>
                <a href="/logout" class="bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-2 rounded-full text-white font-bold">退出</a>
            </div>
            <div class="md:hidden">
                <button class="text-white text-2xl"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="pt-24 pb-12">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl font-bold mb-12 text-center gradient-text">生成历史</h1>
            
            <!-- 图片列表 -->
            {% if images and images|length > 0 %}
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {% for image in images %}
                <div class="bg-gray-800 bg-opacity-50 rounded-xl overflow-hidden neon-border">
                    <div class="image-container h-64">
                        <img src="{{ image.image_url }}" alt="{{ image.prompt }}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-4">
                        <p class="text-sm text-gray-400 mb-2">{{ image.created_at }}</p>
                        <h3 class="text-lg font-semibold mb-2 truncate">{{ image.prompt }}</h3>
                        <p class="text-sm text-gray-400">风格: {{ image.style }}</p>
                        <div class="flex justify-between mt-4">
                            <a href="#" onclick="downloadImage('{{ image.image_url }}', '{{ image.prompt }}')" class="text-blue-400 hover:text-blue-300 flex items-center">
                                <i class="fas fa-download mr-1"></i> 下载
                            </a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <div class="text-center py-16">
                <i class="fas fa-image text-6xl text-gray-700 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-400">暂无历史记录</h2>
                <p class="text-gray-500 mt-2">去生成一些惊艳的图片吧</p>
                <a href="/create" class="inline-block mt-6 bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-3 rounded-full text-white font-bold">开始创作</a>
            </div>
            {% endif %}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-black bg-opacity-80 py-6 text-center text-gray-500">
        <div class="container mx-auto px-4">
            <p>© 2025 VISIONARY AI图像生成平台. 保留所有权利.</p>
        </div>
    </footer>

    <script>
        // 图片下载功能
        function downloadImage(imageUrl, imageName) {
            // 阻止默认链接行为
            event.preventDefault();
            
            // 创建一个隐藏的a标签用于下载
            fetch(imageUrl)
                .then(response => response.blob())
                .then(blob => {
                    // 创建一个指向Blob的URL
                    const blobUrl = URL.createObjectURL(blob);
                    
                    // 创建下载链接
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    
                    // 生成文件名 (使用提示词作为文件名基础，限制长度并移除非法字符)
                    const fileName = imageName
                        ? imageName.substring(0, 30).replace(/[\\/:*?"<>|]/g, "_") + ".jpg" 
                        : "visionary-image.jpg";
                    
                    a.download = fileName;
                    a.style.display = 'none';
                    
                    // 添加到DOM，触发点击，然后移除
                    document.body.appendChild(a);
                    a.click();
                    
                    // 清理
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(blobUrl); // 释放Blob URL
                    }, 100);
                })
                .catch(error => {
                    console.error('下载图片失败:', error);
                    alert('下载图片失败，请重试');
                });
        }
    </script>
</body>
</html>
