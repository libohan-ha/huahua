<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - VISIONARY</title>
    <link href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-100-M/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-neon-pink: #ff1493;
            --color-electric-blue: #00ffff;
            --color-purple: #9d4edd;
            --color-dark-blue: #0a1128;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }
        
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, 5%) scale(1.1); }
            50% { transform: translate(0, 10%) scale(0.9); }
            75% { transform: translate(-5%, 5%) scale(1.05); }
        }
        
        .gradient-text {
            background: linear-gradient(45deg, var(--color-neon-pink), var(--color-electric-blue), var(--color-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 to-black">
    <!-- 动态背景 -->
    <div class="animated-bg">
        <div class="bg-blob" style="top: 15%; left: 10%; width: 500px; height: 500px; background: rgba(255, 20, 147, 0.2); animation-delay: 0s;"></div>
        <div class="bg-blob" style="top: 50%; left: 60%; width: 600px; height: 600px; background: rgba(0, 255, 255, 0.2); animation-delay: 2s;"></div>
        <div class="bg-blob" style="top: 70%; left: 20%; width: 400px; height: 400px; background: rgba(157, 78, 221, 0.2); animation-delay: 4s;"></div>
    </div>
    
    <!-- 顶部导航栏 -->
    <nav class="fixed w-full z-50 bg-black bg-opacity-80 backdrop-filter backdrop-blur-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <h1 class="text-3xl font-bold gradient-text">VISIONARY</h1>
            </div>
            <div class="hidden md:flex space-x-8 items-center">
                <a href="/" class="text-white hover:text-pink-500 transition-colors">首页</a>
                <a href="/create" class="text-white hover:text-pink-500 transition-colors">生成图片</a>
                <a href="/create-card" class="text-white hover:text-pink-500 transition-colors">生成卡片</a>
                <a href="/create-webpage" class="text-white hover:text-pink-500 transition-colors">生成网页</a>
                <a href="/unified-history" class="text-white hover:text-pink-500 transition-colors">创作历史</a>
                <a href="/logout" class="bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-2 rounded-full text-white font-bold">退出</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="flex-1 flex items-center justify-center pt-24">
        <div class="container mx-auto px-4 text-center">
            <div class="w-full max-w-xl mx-auto bg-gray-800 bg-opacity-50 p-8 rounded-xl shadow-xl">
                <div class="mb-6">
                    <i class="fas fa-exclamation-circle text-red-500 text-6xl"></i>
                </div>
                <h1 class="text-3xl font-bold mb-4">发生错误</h1>
                <p class="text-gray-300 mb-6">{{ message }}</p>
                <div class="flex justify-center space-x-4">
                    <a href="/" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-lg">
                        <i class="fas fa-home mr-2"></i>返回首页
                    </a>
                    <a href="javascript:history.back()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg">
                        <i class="fas fa-arrow-left mr-2"></i>返回上一页
                    </a>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        // JavaScript代码 (如果需要)
    </script>
</body>
</html>
